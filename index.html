<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="margin: 0; padding: 0; margin: 8px">
    <!-- Outer wrapper td handles padding instead of table (Outlook fix) -->
    <table
      border="0"
      cellspacing="0"
      cellpadding="0"
      width="420"
      bgcolor="#e6eeeb"
      style="width: 420px; background-color: #e6eeeb; border-radius: 20px"
    >
      <tr>
        <td style="padding: 20px 20px 24px 20px">
          <table border="0" cellspacing="0" cellpadding="0" width="100%">
            <tr>
              <!-- Left: Logo Mark + Brand Logo -->
              <td
                width="120"
                valign="top"
                align="center"
                style="padding-right: 16px; width: 120px; padding-top: 4px"
              >
                <img
                  src="https://keshurgojiya.github.io/gentlemenstee_email_signature/images/logo-mark1.png"
                  alt="logo mark"
                  width="52"
                  height="52"
                  style="display: block; width: 52px; height: auto"
                />

                <div style="height: 10px; line-height: 10px; font-size: 10px">
                  &nbsp;
                </div>

                <a
                  href="https://gentlemenstee.com/"
                  target="_blank"
                  style="text-decoration: none"
                >
                  <img
                    src="https://keshurgojiya.github.io/gentlemenstee_email_signature/images/logo.png"
                    alt="logo"
                    width="100"
                    height="auto"
                    style="display: block; width: 100px"
                  />
                </a>
              </td>

              <!-- Right: Contact Info -->
              <td valign="top">
                <p
                  style="
                    color: #302f2f;
                    font-size: 14pt;
                    font-family:
                      &quot;DM Sans&quot;, Arial, Helvetica, sans-serif;
                    font-weight: 500;
                    margin: 0;
                    padding: 0 0 7px 0;
                    line-height: 1.2;
                  "
                >
                  Client Services
                </p>

                <p
                  style="
                    color: #302f2f;
                    font-size: 14pt;
                    font-family:
                      &quot;DM Sans&quot;, Arial, Helvetica, sans-serif;
                    font-weight: 900;
                    margin: 0;
                    padding: 0 0 17px 0;
                    line-height: 1;
                  "
                >
                  Gentlemen's Tee
                </p>

                <!-- Icons + Links Table -->
                <table border="0" cellspacing="0" cellpadding="0">
                  <!-- Email Row -->
                  <tr>
                    <td
                      valign="middle"
                      width="20"
                      style="width: 20px; padding-bottom: 12px"
                    >
                      <img
                        src="https://keshurgojiya.github.io/gentlemenstee_email_signature/images/email2.png"
                        alt=""
                        width="14"
                        height="14"
                        style="display: block; width: 14px; height: 14px"
                      />
                    </td>
                    <td
                      valign="middle"
                      style="
                        padding-bottom: 12px;
                        font-size: 11pt;
                        font-family:
                          &quot;DM Sans&quot;, Arial, Helvetica, sans-serif;
                        font-weight: 400;
                        line-height: 1;
                        color: #302f2f;
                      "
                    >
                      <a
                        href="mailto:info@gentlemenstee.com"
                        target="_blank"
                        style="color: #302f2f; text-decoration: none"
                      >
                        info@gentlemenstee.com
                      </a>
                    </td>
                  </tr>

                  <!-- Website Row -->
                  <tr>
                    <td valign="middle" width="20" style="width: 20px">
                      <img
                        src="https://keshurgojiya.github.io/gentlemenstee_email_signature/images/website2.png"
                        alt=""
                        width="14"
                        height="14"
                        style="display: block; width: 14px; height: 14px"
                      />
                    </td>
                    <td
                      valign="middle"
                      style="
                        font-size: 11pt;
                        font-family:
                          &quot;DM Sans&quot;, Arial, Helvetica, sans-serif;
                        font-weight: 400;
                        line-height: 1;
                        color: #302f2f;
                      "
                    >
                      <a
                        href="https://gentlemenstee.com/"
                        target="_blank"
                        style="color: #302f2f; text-decoration: none"
                      >
                        gentlemenstee.com
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
